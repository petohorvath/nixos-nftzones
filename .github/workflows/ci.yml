name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - name: Apply formatter
        run: nix fmt
      - name: Verify no formatting drift
        run: git diff --exit-code

  unit:
    name: unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - name: Build unit checks
        run: nix build --print-build-logs .#checks.x86_64-linux.unit

  integration:
    name: integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
      - name: Build integration checks
        run: nix build --print-build-logs .#checks.x86_64-linux.integration

  vm:
    name: vm tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # GitHub-hosted ubuntu-latest runners support nested
      # virtualization, but `/dev/kvm` is owned by root:kvm with
      # mode 0660 by default. The nix-daemon needs world-readable
      # access, so widen permissions via udev before installing
      # Nix. Pattern lifted from nixpkgs CI.
      - name: Enable KVM device access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            system-features = kvm nixos-test benchmark big-parallel uid-range
      - name: Build VM checks
        run: nix build --print-build-logs .#checks.x86_64-linux.vm
